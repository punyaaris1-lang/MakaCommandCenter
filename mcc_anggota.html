<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MCC - Pusat Kendali Anggota</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #f4f7f6; color: #1e293b; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 100px; }
        .header { background: #fff; padding: 20px 15px; text-align: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 990; border-bottom: 3px solid #2563eb; }
        .header h2 { margin: 0; font-family: 'Outfit'; font-size: 22px; color: #2563eb; text-transform: uppercase; }
        
        .main-panel { padding: 15px; }
        .search-box { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #e2e8f0; margin-bottom: 15px; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: #2563eb; box-shadow: 0 0 15px rgba(37,99,235,0.1); }
        
        .filter-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-filter { flex: 1; padding: 10px; border: 1px solid #cbd5e1; background: white; border-radius: 8px; font-size: 11px; font-weight: 800; color: #64748b; cursor: pointer; transition: 0.2s; }
        .btn-filter.active { background: #2563eb; color: white; border-color: #2563eb; }
        .btn-filter.active-kc { background: #D4FF00; color: black; border-color: #D4FF00; }

        .grid-anggota { display: flex; flex-direction: column; gap: 12px; }
        .card-member { background: #fff; border-radius: 18px; padding: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; }
        .card-pengurus { background: linear-gradient(135deg, #ffffff 0%, #fffbeb 100%); border-color: #fcd34d; }
        .card-kc { border-left: 5px solid #D4FF00; }
        
        .m-photo { width: 55px; height: 55px; border-radius: 15px; object-fit: cover; background: #2563eb; color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; flex-shrink: 0; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        
        .member-info { flex: 1; min-width: 0; }
        .member-name { margin: 0; font-family: 'Outfit'; font-size: 16px; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .member-plat { font-size: 12px; font-weight: 800; color: #2563eb; margin: 2px 0; letter-spacing: 0.5px; }
        .badge { display: inline-block; font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; margin-top: 4px; }
        .bg-member { background: #f1f5f9; color: #64748b; }
        .bg-pengurus { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
        .bg-db-tag { background: #e2e8f0; color: #475569; font-size: 8px; border: 1px dashed #cbd5e1;}

        .action-group { display: flex; flex-direction: column; gap: 8px; }
        .btn-icon { width: 38px; height: 38px; border-radius: 12px; border: none; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-del { background: #fef2f2; color: #ef4444; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #e2e8f0; z-index: 999; }
        .nav-item { background: none; border: none; color: #94a3b8; font-size: 22px; display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 20%; transition: 0.3s; }
        .nav-item span { font-size: 10px; margin-top: 5px; font-weight: 700; }
        .nav-item.active { color: #2563eb; transform: translateY(-3px); }
    </style>
</head>
<body>

    <div class="header">
        <h2>MCC SYSTEM</h2>
        <small style="color:#64748b; font-weight:700;">COMMAND CENTER // DATA ANGGOTA GABUNGAN</small>
    </div>

    <div class="main-panel">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Cari nama atau pelat nomor..." onkeyup="filterList()">
        
        <div class="filter-group">
            <button class="btn-filter active" id="btnAll" onclick="setFilter('ALL')">SEMUA</button>
            <button class="btn-filter" id="btnMLU" onclick="setFilter('MLU')">MLU</button>
            <button class="btn-filter" id="btnKC" onclick="setFilter('KC')">KC</button>
        </div>

        <div id="memberList" class="grid-anggota">
            <p style="text-align: center; color: #94a3b8; padding: 40px;"><i class="fa-solid fa-spinner fa-spin fa-2x"></i> Menggabungkan Database...</p>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='mcc_peta.html'"><i class="fa-solid fa-map-location-dot"></i><span>Peta</span></button>
        <button class="nav-item active"><i class="fa-solid fa-users"></i><span>Anggota</span></button>
        <button class="nav-item" onclick="window.location.href='mcc_keuangan.html'"><i class="fa-solid fa-wallet"></i><span>Keuangan</span></button>
        <button class="nav-item" onclick="window.location.href='mcc_antrean.html'"><i class="fa-solid fa-clipboard-list"></i><span>Antrean</span></button>
        <button class="nav-item" onclick="window.location.href='mcc_pesan.html'"><i class="fa-solid fa-bullhorn"></i><span>Pesan</span></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // DUAL KONEKSI FIREBASE
        const appMLU = initializeApp({ apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5" }, "MLU_DB");
        const dbMLU = getFirestore(appMLU);
        
        const appKC = initializeApp({ apiKey: "AIzaSyDfsTAGclYUSRe6YhiljS-xb-v-9RBYVEM", authDomain: "antriankcnew.firebaseapp.com", projectId: "antriankcnew" }, "KC_DB");
        const dbKC = getFirestore(appKC);

        let dataMLU = [];
        let dataKC = [];
        let allMembers = [];
        let activeFilter = 'ALL';

        // BACA DB MLU
        onSnapshot(collection(dbMLU, "mlu_members"), (snapshot) => {
            dataMLU = [];
            snapshot.forEach((doc) => { dataMLU.push({ id: doc.id, dbSource: 'MLU', ...doc.data() }); });
            combineAndRender();
        });

        // BACA DB KC
        onSnapshot(collection(dbKC, "anggota"), (snapshot) => {
            dataKC = [];
            snapshot.forEach((doc) => { dataKC.push({ id: doc.id, dbSource: 'KC', ...doc.data() }); });
            combineAndRender();
        });

        function combineAndRender() {
            allMembers = [...dataMLU, ...dataKC];
            
            // LOGIKA AUTO-SORT: Pengurus di Atas, lalu urut Nama
            allMembers.sort((a, b) => {
                const aRole = (a.role || "").toUpperCase();
                const bRole = (b.role || "").toUpperCase();
                const aIsP = (aRole !== 'KELUARGA MLU' && aRole !== 'MEMBER' && aRole !== '');
                const bIsP = (bRole !== 'KELUARGA MLU' && bRole !== 'MEMBER' && bRole !== '');
                
                if (aIsP && !bIsP) return -1;
                if (!aIsP && bIsP) return 1;
                return (a.namaKtp || a.nama || "").localeCompare(b.namaKtp || b.nama || "");
            });
            
            filterList();
        }

        window.setFilter = (type) => {
            activeFilter = type;
            document.querySelectorAll('.btn-filter').forEach(b => b.className = 'btn-filter');
            if(type === 'ALL') document.getElementById('btnAll').classList.add('active');
            if(type === 'MLU') document.getElementById('btnMLU').classList.add('active');
            if(type === 'KC') document.getElementById('btnKC').classList.add('active-kc');
            filterList();
        };

        window.filterList = () => {
            const k = document.getElementById('searchInput').value.toLowerCase();
            
            let filteredData = allMembers.filter(m => {
                const isMatchSearch = (m.namaKtp || m.nama || "").toLowerCase().includes(k) || (m.plat || "").toLowerCase().includes(k);
                const isMatchFilter = (activeFilter === 'ALL') || (m.dbSource === activeFilter);
                return isMatchSearch && isMatchFilter;
            });

            renderList(filteredData);
        };

        function renderList(data) {
            const list = document.getElementById('memberList');
            list.innerHTML = '';
            
            if(data.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #94a3b8; padding: 20px;">Data tidak ditemukan.</p>';
                return;
            }

            data.forEach(m => {
                const role = (m.role || "").toUpperCase();
                const isP = (role !== 'KELUARGA MLU' && role !== 'MEMBER' && role !== '');
                const name = m.namaKtp || m.namaWa || m.nama || "Tanpa Nama";
                
                let photoHtml = `<div class="m-photo">${name.charAt(0)}</div>`;
                if(m.foto && m.foto.length > 100) {
                    photoHtml = `<img src="${m.foto}" class="m-photo">`;
                }

                const dbTag = m.dbSource === 'KC' ? `<span class="badge bg-db-tag" style="border-color:#D4FF00; color:#D4FF00; background:#000;">DB: KC</span>` : `<span class="badge bg-db-tag">DB: MLU</span>`;
                const cardClass = m.dbSource === 'KC' ? 'card-kc' : '';

                list.innerHTML += `
                    <div class="card-member ${isP ? 'card-pengurus' : ''} ${cardClass}">
                        ${photoHtml}
                        <div class="member-info">
                            <h4 class="member-name">${name}</h4>
                            <p class="member-plat">${m.plat || "-"}</p>
                            <span class="badge ${isP ? 'bg-pengurus' : 'bg-member'}">${m.role || 'MEMBER'}</span>
                            ${dbTag}
                        </div>
                        <div class="action-group">
                            <button class="btn-icon btn-del" onclick="hapusData('${m.id}', '${name}', '${m.dbSource}')" title="Hapus dari Database"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>`;
            });
        }

        window.hapusData = async (id, nama, dbSource) => {
            if(confirm(`⚠️ HAPUS PERMANEN DARI DATABASE ${dbSource}?\nAnggota: ${nama}\n\nData tidak bisa dikembalikan!`)) {
                try {
                    const targetDB = dbSource === 'KC' ? dbKC : dbMLU;
                    const collectionName = dbSource === 'KC' ? 'anggota' : 'mlu_members';
                    await deleteDoc(doc(targetDB, collectionName, id));
                    alert("Data berhasil dihapus.");
                } catch(e) {
                    alert("Error hapus data: " + e.message);
                }
            }
        };
    </script>
</body>
</html>

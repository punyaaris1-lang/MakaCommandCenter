<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MCC - Live Tracking & SOS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --royal-blue: #0A2259; --electric-blue: #2563eb; --danger: #ef4444; --success: #10B981; --warning: #f59e0b; }
        body { background: #f4f7f6; color: #1e293b; font-family: 'Inter', sans-serif; margin: 0; padding: 0; padding-bottom: 90px; height: 100vh; overflow: hidden; }
        
        /* HEADER OVERLAY */
        .header { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 15px; text-align: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: absolute; top: 0; left: 0; right: 0; z-index: 1000; border-bottom: 3px solid var(--electric-blue); }
        .header h2 { margin: 0; font-family: 'Outfit'; font-size: 20px; color: var(--electric-blue); text-transform: uppercase; }

        /* FULL SCREEN MAP */
        #map { width: 100%; height: 100vh; z-index: 1; background: #e5e7eb; }

        /* RADAR OVERLAY */
        .radar-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; pointer-events: none; z-index: 500; display: none; }
        .radar-sweep { width: 100%; height: 100%; background: conic-gradient(from 0deg, transparent 70%, rgba(37, 99, 235, 0.2) 100%); border-radius: 50%; animation: scan 3s linear infinite; border: 1px solid rgba(37, 99, 235, 0.1); }
        @keyframes scan { 100% { transform: rotate(360deg); } }

        /* FLOATING CONTROLS */
        .map-controls { position: absolute; bottom: 110px; left: 20px; right: 20px; z-index: 1000; text-align: center; }
        .btn-radar { background: var(--electric-blue); color: white; border: none; padding: 15px 25px; cursor: pointer; font-weight: 800; border-radius: 50px; width: 100%; max-width: 320px; font-family: 'Space Grotesk'; font-size: 13px; box-shadow: 0 10px 25px rgba(37,99,235,0.4); transition: 0.3s; letter-spacing: 1px; }
        .btn-radar.on { background: var(--danger); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* CUSTOM MARKERS */
        .custom-div-icon { background: transparent; border: none; }
        
        /* Marker Member (Foto) */
        .marker-pin { width: 40px; height: 40px; border-radius: 50%; background: var(--electric-blue); border: 2px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .marker-pin img { width: 100%; height: 100%; object-fit: cover; }
        .marker-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); background: white; padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 800; white-space: nowrap; box-shadow: 0 3px 6px rgba(0,0,0,0.3); color: #1e293b; border: 1px solid #e2e8f0; }

        /* Marker Stasiun FC */
        .marker-fc { width: 35px; height: 35px; border-radius: 12px; background: linear-gradient(135deg, #f59e0b, #d97706); border: 2px solid white; box-shadow: 0 5px 15px rgba(245, 158, 11, 0.5); display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }

        /* S.O.S ALARM BOX */
        #sosAlertBox { display:none; position:absolute; top:80px; left:50%; transform:translateX(-50%); width:90%; max-width:400px; background:linear-gradient(135deg, #ef4444, #991b1b); color:white; padding:20px; border-radius:20px; z-index:9999; box-shadow:0 10px 30px rgba(239,68,68,0.5); border:2px solid white; animation: slideDown 0.5s; }
        @keyframes slideDown { from {top:-100px; opacity:0;} to {top:80px; opacity:1;} }
        
        .rescue-item { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:12px; border-bottom:1px dashed rgba(255,255,255,0.3); padding-bottom:8px; }
        .btn-rescue-wa { background:#10B981; color:white !important; padding:6px 12px; border-radius:8px; text-decoration:none; font-weight:800; font-size:10px; box-shadow:0 3px 10px rgba(0,0,0,0.2); transition:0.2s;}
        .btn-rescue-wa:active { transform:scale(0.95); }

        /* POPUP INTELLIGENCE CARD (MEMBER) */
        .leaflet-popup-content-wrapper { border-radius: 16px; padding: 0; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .leaflet-popup-content { margin: 0; }
        .intel-card { padding: 15px; text-align: center; min-width: 140px; background: white; }
        .intel-photo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 3px solid var(--electric-blue); box-shadow: 0 5px 10px rgba(37,99,235,0.2); margin-bottom: 8px; }
        .intel-name { margin: 0; font-family: 'Outfit'; font-size: 16px; font-weight: 800; color: var(--royal-blue); }
        .intel-plat { font-family: 'Courier New', Courier, monospace; font-size: 13px; font-weight: 900; color: var(--text-main); margin: 2px 0 5px; }
        .intel-role { font-size: 9px; font-weight: 800; background: #f1f5f9; color: #64748b; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; display: inline-block; margin-bottom: 10px; }
        .intel-btn-wa { display: block; background: var(--success); color: white !important; text-decoration: none; font-weight: 800; font-size: 11px; padding: 8px; border-radius: 8px; transition: 0.2s; box-shadow: 0 5px 15px rgba(16,185,129,0.3); }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #e2e8f0; z-index: 1001; }
        .nav-item { background: none; border: none; color: #94a3b8; font-size: 22px; display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 20%; transition: 0.3s; }
        .nav-item span { font-size: 10px; margin-top: 5px; font-weight: 700; }
        .nav-item.active { color: var(--electric-blue); transform: translateY(-3px); }
    </style>
</head>
<body>

    <div class="header">
        <h2><i class="fa-solid fa-satellite"></i> SATELLITE TRACKER</h2>
        <small id="status-text" style="color:#64748b; font-weight:700; letter-spacing:1px;">SISTEM STANDBY</small>
    </div>

    <div id="sosAlertBox">
        <h3 style="margin:0 0 10px; font-family:'Outfit';"><i class="fa-solid fa-triangle-exclamation fa-fade"></i> DARURAT S.O.S!</h3>
        <div id="sosVictimInfo" style="font-size:14px; margin-bottom:15px; font-weight:600; line-height:1.4;"></div>
        <div style="background:rgba(255,255,255,0.2); padding:12px; border-radius:12px;">
            <div style="font-size:10px; font-weight:800; letter-spacing:1px; margin-bottom:8px; color:#fca5a5;">🚀 TIM PENYELAMAT TERDEKAT:</div>
            <div id="sosRescuers"></div>
        </div>
        <div style="margin-top:15px; display:flex; gap:10px;">
            <button onclick="selesaikanSos()" style="flex:1; padding:12px; border-radius:12px; border:none; font-family:'Space Grotesk'; font-size:12px; font-weight:900; color:#ef4444; background:white; cursor:pointer; box-shadow:0 5px 15px rgba(0,0,0,0.2);">S.O.S DISELESAIKAN (RESOLVED)</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="radar-container" id="radar-ui">
        <div class="radar-sweep"></div>
    </div>

    <div class="map-controls">
        <button id="btnToggleRadar" class="btn-radar" onclick="toggleRadar()">
            <i class="fa-solid fa-crosshairs"></i> SCAN LOKASI PASUKAN
        </button>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active"><i class="fa-solid fa-map-location-dot"></i><span>Peta</span></button>
        <button class="nav-item" onclick="window.location.href='mcc_anggota.html'"><i class="fa-solid fa-users"></i><span>Anggota</span></button>
        <button class="nav-item" onclick="window.location.href='mcc_keuangan.html'"><i class="fa-solid fa-wallet"></i><span>Keuangan</span></button>
        <button class="nav-item" onclick="window.location.href='mcc_antrean.html'"><i class="fa-solid fa-clipboard-list"></i><span>Antrean</span></button>
        <button class="nav-item" onclick="window.location.href='mcc_pesan.html'"><i class="fa-solid fa-bullhorn"></i><span>Pesan</span></button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // CONFIG FIREBASE MLU
        const firebaseConfig = { 
            apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", 
            authDomain: "rtomaka-e67b5.firebaseapp.com", 
            projectId: "rtomaka-e67b5" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // INIT MAP
        const map = L.map('map', { zoomControl: false }).setView([-6.200000, 106.816666], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);

        let fcMarkersGroup = L.layerGroup().addTo(map); // Layer khusus Stasiun FC (Permanen)
        let markersGroup = L.layerGroup().addTo(map);   // Layer khusus Pasukan/Anggota
        
        let radarActive = false;
        let unsubscribe = null;
        let currentMembers = []; 
        let sosMarker = null;

        // RUMUS HAVERSINE
        function calcDist(lat1, lon1, lat2, lon2) {
            const p = 0.017453292519943295, c = Math.cos;
            const a = 0.5 - c((lat2 - lat1) * p)/2 + c(lat1 * p) * c(lat2 * p) * (1 - c((lon2 - lon1) * p))/2;
            return 12742 * Math.asin(Math.sqrt(a)); 
        }

        // ==========================================
        // 1. LOAD STASIUN FC (PERMANEN MUNCUL)
        // ==========================================
        onSnapshot(collection(db, "fc_locations"), (snap) => {
            fcMarkersGroup.clearLayers();
            snap.forEach(doc => {
                const d = doc.data();
                const lat = d.latitude || d.lat;
                const lng = d.longitude || d.lng;
                
                if (lat && lng) {
                    const fcIcon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="marker-fc"><i class="fa-solid fa-charging-station"></i></div>`,
                        iconSize: [35, 35], iconAnchor: [17, 17]
                    });
                    
                    const marker = L.marker([lat, lng], {icon: fcIcon}).addTo(fcMarkersGroup);
                    marker.bindPopup(`
                        <div style="text-align:center; padding:10px;">
                            <h4 style="margin:0 0 5px; color:#b45309; font-family:'Outfit';">${d.nama || doc.id}</h4>
                            <div style="font-size:10px; color:gray; font-weight:bold;">STASIUN FAST CHARGING</div>
                        </div>
                    `);
                }
            });
        });


        // ==========================================
        // 2. FUNGSI RADAR UTAMA (LACAK PASUKAN)
        // ==========================================
        window.toggleRadar = () => {
            const btn = document.getElementById('btnToggleRadar');
            const radarUI = document.getElementById('radar-ui');
            const statusTxt = document.getElementById('status-text');
            
            radarActive = !radarActive;

            if (radarActive) {
                localStorage.setItem('mcc_radar_on', 'true');
                radarUI.style.display = 'block';
                btn.classList.add('on');
                btn.innerHTML = '<i class="fa-solid fa-sync fa-spin"></i> MELACAK PERGERAKAN...';
                statusTxt.innerText = "RADAR AKTIF // MENARIK DATA";
                statusTxt.style.color = "var(--danger)";

                unsubscribe = onSnapshot(collection(db, "mlu_members"), (snap) => {
                    markersGroup.clearLayers();
                    currentMembers = [];
                    let memberCount = 0;

                    snap.forEach(doc => {
                        const d = doc.data();
                        currentMembers.push({id: doc.id, ...d}); 

                        if (d.isSharing === true && d.lat && d.lng) {
                            memberCount++;
                            const nama = d.namaKtp || d.namaWa || d.nama || "Tanpa Nama";
                            const plat = d.plat || "No Plat";
                            const role = d.role || "MEMBER";
                            const noHp = d.hp ? d.hp.replace(/^0+/, '') : ''; 
                            const fotoSrc = (d.foto && d.foto.length > 50) ? d.foto : `https://ui-avatars.com/api/?background=2563eb&color=fff&name=${encodeURIComponent(nama)}`;

                            const iconHtml = `<div class="marker-pin"><img src="${fotoSrc}"><div class="marker-label">${nama.split(' ')[0]}</div></div>`;
                            const customIcon = L.divIcon({ className: 'custom-div-icon', html: iconHtml, iconSize: [40, 50], iconAnchor: [20, 50] });

                            const marker = L.marker([d.lat, d.lng], { icon: customIcon }).addTo(markersGroup);

                            let waButton = noHp ? `<a href="https://wa.me/62${noHp}" target="_blank" class="intel-btn-wa"><i class="fab fa-whatsapp"></i> HUBUNGI MEMBER</a>` : '';
                            marker.bindPopup(`
                                <div class="intel-card">
                                    <img src="${fotoSrc}" class="intel-photo">
                                    <h4 class="intel-name">${nama}</h4>
                                    <div class="intel-plat">${plat}</div>
                                    <div class="intel-role">${role}</div>
                                    ${waButton}
                                </div>
                            `);
                        }
                    });

                    if(memberCount > 0) {
                        statusTxt.innerText = `MELACAK ${memberCount} PASUKAN AKTIF`;
                        statusTxt.style.color = "var(--success)";
                    } else {
                        statusTxt.innerText = `TIDAK ADA PASUKAN DI RADAR`;
                        statusTxt.style.color = "#94a3b8";
                    }
                });

            } else {
                localStorage.setItem('mcc_radar_on', 'false');
                radarUI.style.display = 'none';
                btn.classList.remove('on');
                btn.innerHTML = '<i class="fa-solid fa-crosshairs"></i> SCAN LOKASI PASUKAN';
                statusTxt.innerText = "SISTEM STANDBY";
                statusTxt.style.color = "#64748b";
                
                if (unsubscribe) unsubscribe();
                markersGroup.clearLayers();
                // Catatan: Jangan kosongkan currentMembers agar sistem SOS tetap bisa bekerja dengan data terakhir
            }
        };

        if (localStorage.getItem('mcc_radar_on') === 'true') { window.toggleRadar(); }

        // ==========================================
        // 3. SISTEM DETEKSI DARURAT (S.O.S) 
        // ==========================================
        window.activeSosId = null;

        onSnapshot(query(collection(db, "mlu_sos"), where("status", "==", "ACTIVE")), (snap) => {
            const alertBox = document.getElementById('sosAlertBox');
            
            if(snap.empty) {
                alertBox.style.display = 'none';
                if(sosMarker && map) map.removeLayer(sosMarker);
                return;
            }
            
            const sosData = snap.docs[0].data();
            window.activeSosId = snap.docs[0].id;
            
            document.getElementById('sosVictimInfo').innerHTML = `
                <b>${sosData.nama}</b> (${sosData.plat})<br>
                <span style="color:#fca5a5;">Kasus:</span> ${sosData.jenis}<br>
                <span style="color:#fca5a5;">Ket:</span> ${sosData.keterangan || "Tidak ada."}
            `;

            let rescuers = [];
            currentMembers.forEach(m => {
                if(m.isSharing && m.lat && m.lng && m.id !== sosData.memberId) {
                    let dist = calcDist(sosData.lat, sosData.lng, m.lat, m.lng);
                    rescuers.push({ ...m, distance: dist });
                }
            });

            rescuers.sort((a, b) => a.distance - b.distance);
            const top3 = rescuers.slice(0, 3);

            let rescuerHtml = '';
            if(top3.length === 0) {
                rescuerHtml = '<div style="font-size:12px; color:white;">Tidak ada anggota dengan Radar aktif di sekitar.</div>';
            } else {
                top3.forEach((r, idx) => {
                    const noWa = (r.hp || '').replace(/^0+/, '');
                    const waLink = `https://wa.me/62${noWa}?text=🚨%20PANGGILAN%20DARURAT%20MLU!%0A%0A${sosData.nama}%20mengalami%20${sosData.jenis}.%0A%0APosisi%20Anda%20hanya%20berjarak%20${r.distance.toFixed(1)}%20KM%20dari%20korban.%20Mohon%20segera%20bantu!`;
                    
                    rescuerHtml += `
                        <div class="rescue-item">
                            <div><b>${idx+1}. ${r.namaKtp || r.namaWa}</b><br><span style="font-size:10px; color:#fca5a5;">Jarak: ${r.distance.toFixed(1)} KM</span></div>
                            <a href="${waLink}" target="_blank" class="btn-rescue-wa">KIRIM TUGAS</a>
                        </div>
                    `;
                });
            }
            document.getElementById('sosRescuers').innerHTML = rescuerHtml;
            alertBox.style.display = 'block';

            if (map) {
                map.setView([sosData.lat, sosData.lng], 15);
                if(sosMarker) map.removeLayer(sosMarker);
                
                const sosIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div style="width:40px; height:40px; background:#ef4444; border-radius:50%; border:3px solid white; display:flex; align-items:center; justify-content:center; color:white; font-size:20px; box-shadow:0 0 20px rgba(239,68,68,0.8); animation:pulse 1s infinite;"><i class="fa-solid fa-triangle-exclamation"></i></div>`,
                    iconSize: [40,40], iconAnchor: [20,20]
                });
                
                sosMarker = L.marker([sosData.lat, sosData.lng], {icon: sosIcon}).addTo(map)
                             .bindPopup(`<b style="color:red;">LOKASI DARURAT S.O.S!</b>`).openPopup();
            }
        });

        window.selesaikanSos = async () => {
            if(window.activeSosId && confirm("Apakah S.O.S ini sudah tertangani? Alarm akan dimatikan.")) {
                await updateDoc(doc(db, "mlu_sos", window.activeSosId), { status: 'RESOLVED' });
            }
        };
    </script>
</body>
</html>

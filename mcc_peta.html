<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MCC - Live Tracking Satelit</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --royal-blue: #0A2259; --electric-blue: #2563eb; --danger: #ef4444; }
        body { background: #f4f7f6; color: #1e293b; font-family: 'Inter', sans-serif; margin: 0; padding: 0; padding-bottom: 90px; height: 100vh; overflow: hidden; }
        
        /* HEADER OVERLAY */
        .header { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 15px; text-align: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: absolute; top: 0; left: 0; right: 0; z-index: 1000; border-bottom: 3px solid var(--electric-blue); }
        .header h2 { margin: 0; font-family: 'Space Grotesk'; font-size: 18px; color: var(--electric-blue); text-transform: uppercase; }

        /* FULL SCREEN MAP */
        #map { width: 100%; height: 100vh; z-index: 1; background: #e5e7eb; }

        /* RADAR OVERLAY */
        .radar-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; pointer-events: none; z-index: 500; display: none; }
        .radar-sweep { width: 100%; height: 100%; background: conic-gradient(from 0deg, transparent 70%, rgba(37, 99, 235, 0.2) 100%); border-radius: 50%; animation: scan 3s linear infinite; border: 1px solid rgba(37, 99, 235, 0.1); }
        @keyframes scan { 100% { transform: rotate(360deg); } }

        /* FLOATING CONTROLS */
        .map-controls { position: absolute; bottom: 110px; left: 20px; right: 20px; z-index: 1000; text-align: center; }
        .btn-radar { background: var(--electric-blue); color: white; border: none; padding: 15px 25px; cursor: pointer; font-weight: 800; border-radius: 50px; width: 100%; max-width: 300px; font-size: 13px; box-shadow: 0 10px 25px rgba(37,99,235,0.4); transition: 0.3s; }
        .btn-radar.on { background: var(--danger); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #e2e8f0; z-index: 1001; }
        .nav-item { background: none; border: none; color: #94a3b8; font-size: 20px; display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 20%; transition: 0.3s; }
        .nav-item span { font-size: 10px; margin-top: 4px; font-weight: 600; }
        .nav-item.active { color: var(--electric-blue); transform: translateY(-3px); }

        /* CUSTOM MARKER STYLE */
        .custom-marker { background: var(--electric-blue); border: 2px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div class="header">
        <h2>MCC TRACKER</h2>
        <small id="status-text" style="color:#64748b; font-weight:700;">SATELLITE STANDBY</small>
    </div>

    <div id="map"></div>

    <div class="radar-container" id="radar-ui">
        <div class="radar-sweep"></div>
    </div>

    <div class="map-controls">
        <button id="btnToggleRadar" class="btn-radar" onclick="toggleRadar()">
            <i class="fa-solid fa-satellite-dish"></i> AKTIFKAN RADAR TRACKING
        </button>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active"><i class="fa-solid fa-map-location-dot"></i><span>Peta</span></button>
        <button class="nav-item" onclick="window.location.href='mcc_anggota.html'"><i class="fa-solid fa-users"></i><span>Anggota</span></button>
        <button class="nav-item" onclick="window.location.href='mcc_keuangan.html'"><i class="fa-solid fa-wallet"></i><span>Keuangan</span></button>
        <button class="nav-item" onclick="window.location.href='mcc_antrean.html'"><i class="fa-solid fa-clipboard-list"></i><span>Antrean</span></button>
        <button class="nav-item" onclick="window.location.href='mcc_pesan.html'"><i class="fa-solid fa-bullhorn"></i><span>Pesan</span></button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // CONFIG FIREBASE
        const firebaseConfig = { 
            apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", 
            authDomain: "rtomaka-e67b5.firebaseapp.com", 
            projectId: "rtomaka-e67b5" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // INIT MAP (Jakarta Default)
        const map = L.map('map', { zoomControl: false }).setView([-6.200000, 106.816666], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);

        let markersGroup = L.layerGroup().addTo(map);
        let radarActive = false;
        let unsubscribe = null;

        window.toggleRadar = () => {
            const btn = document.getElementById('btnToggleRadar');
            const radarUI = document.getElementById('radar-ui');
            const statusTxt = document.getElementById('status-text');
            
            radarActive = !radarActive;

            if (radarActive) {
                localStorage.setItem('mcc_radar_on', 'true');
                radarUI.style.display = 'block';
                btn.classList.add('on');
                btn.innerHTML = '<i class="fa-solid fa-sync fa-spin"></i> MENYAPU AREA (SCANNING...)';
                statusTxt.innerText = "RADAR ACTIVE // TRACKING ON";
                statusTxt.style.color = "var(--danger)";

                // Start Firebase Listener
                unsubscribe = onSnapshot(collection(db, "fc_locations"), (snap) => {
                    markersGroup.clearLayers();
                    snap.forEach(doc => {
                        const d = doc.data();
                        const lat = d.latitude || d.lat;
                        const lng = d.longitude || d.lng;
                        if (lat && lng) {
                            const marker = L.circleMarker([lat, lng], {
                                radius: 8, color: '#fff', weight: 2, opacity: 1,
                                fillCompositeOperation: 'screen', fillColor: '#2563eb', fillOpacity: 0.8
                            }).addTo(markersGroup);
                            marker.bindPopup(`<b>${d.nama || doc.id}</b><br><small>${d.plat || ''}</small>`);
                        }
                    });
                });
            } else {
                localStorage.setItem('mcc_radar_on', 'false');
                radarUI.style.display = 'none';
                btn.classList.remove('on');
                btn.innerHTML = '<i class="fa-solid fa-satellite-dish"></i> AKTIFKAN RADAR TRACKING';
                statusTxt.innerText = "SATELLITE STANDBY";
                statusTxt.style.color = "#64748b";
                
                if (unsubscribe) unsubscribe();
                markersGroup.clearLayers();
            }
        };

        // AUTO-START DARI MEMORI
        if (localStorage.getItem('mcc_radar_on') === 'true') {
            window.toggleRadar();
        }
    </script>
</body>
</html>

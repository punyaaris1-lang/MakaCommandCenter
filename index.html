<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MCC - Super Clone App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* BASE THEME (MLU) */
        :root { 
            --royal-blue: #0A2259; --electric-blue: #2D63ED; --gold-lux: #D4AF37;
            --bg-surface: #F0F4F8; --text-main: #0F172A; --text-muted: #64748B; 
            --glass-bg: rgba(255, 255, 255, 0.85); --glass-border: rgba(255, 255, 255, 0.9);
            --shadow-soft: 0 10px 40px rgba(10, 34, 89, 0.08);
            --success: #10B981; --warning: #F59E0B; --danger: #EF4444;
        }

        /* KC THEME (Kuning Stabilo / Hijau) */
        html.theme-kc {
            --royal-blue: #064E3B; /* Hijau Gelap */
            --electric-blue: #059669; /* Hijau Terang */
            --gold-lux: #D4FF00; /* Kuning Stabilo */
            --bg-surface: #F0FDF4; 
            --text-main: #064E3B; 
            --glass-bg: rgba(255, 255, 255, 0.95); --glass-border: rgba(6, 78, 59, 0.15); 
            --shadow-soft: 0 15px 35px rgba(6, 78, 59, 0.08);
        }

        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; color: var(--text-main); padding-bottom: 120px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; transition: background 0.4s;}
        * { box-sizing: border-box; outline: none; text-decoration: none; transition: background 0.4s, color 0.4s, border-color 0.4s;}

        /* SECURITY LOCK SCREEN */
        #authScreen { position: fixed; inset: 0; background: #050A15; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: opacity 0.5s; }
        .auth-icon { font-size: 60px; color: var(--danger); margin-bottom: 20px; text-shadow: 0 0 20px rgba(239,68,68,0.5); }
        .auth-title { font-family: 'Space Grotesk'; color: #fff; margin: 0 0 5px; font-size: 24px; font-weight: 900; letter-spacing: 2px;}
        .auth-input { padding: 15px; width: 100%; max-width: 300px; text-align: center; font-family: 'Space Grotesk'; font-size: 24px; letter-spacing: 8px; border-radius: 12px; border: 2px solid var(--danger); background: #000; color: #fff; margin: 25px 0 15px; outline: none;}
        .auth-btn { padding: 15px 30px; background: var(--danger); color: #fff; border: none; border-radius: 12px; font-weight: 900; font-family: 'Space Grotesk'; cursor: pointer; width: 100%; max-width: 300px; font-size: 16px; box-shadow: 0 10px 20px rgba(239,68,68,0.3);}

        /* SAKLAR DIMENSI (HEADER DEWA) */
        .dimensi-switch-container { padding: 15px 20px 0; display: flex; justify-content: center; position: relative; z-index: 50; }
        .dimensi-switch { background: rgba(0,0,0,0.05); border-radius: 50px; padding: 4px; display: flex; position: relative; width: 200px; border: 1px solid rgba(0,0,0,0.1); }
        .ds-btn { flex: 1; text-align: center; padding: 8px 0; font-family: 'Space Grotesk'; font-weight: 900; font-size: 11px; color: var(--text-muted); cursor: pointer; z-index: 2; position: relative; }
        .ds-slider { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px); background: var(--royal-blue); border-radius: 50px; transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 1; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        html.theme-kc .ds-slider { left: calc(50%); background: var(--electric-blue); }
        html.theme-kc .ds-slider::after { content: 'KARTIKA CHANDRA'; position: absolute; inset:0; display:flex; align-items:center; justify-content:center; color: #fff; font-family:'Space Grotesk'; font-weight:900; font-size:10px; }
        html:not(.theme-kc) .ds-slider::after { content: 'MLU MASTER'; position: absolute; inset:0; display:flex; align-items:center; justify-content:center; color: #fff; font-family:'Space Grotesk'; font-weight:900; font-size:10px; }

        /* DASHBOARD ASLI CLONE */
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(30px); border: 1.5px solid var(--glass-border); box-shadow: var(--shadow-soft); position: relative; overflow: hidden; border-radius: 28px;}
        .dashboard-header { padding: 25px 20px 15px; position: relative; z-index: 10; }
        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        .greeting { font-family: 'Outfit'; font-size: 32px; font-weight: 900; color: var(--royal-blue); line-height: 1; letter-spacing: -1px; margin-bottom: 8px; cursor: pointer; user-select: none;}
        .date-text { font-family: 'Space Grotesk'; font-size: 10px; font-weight: 800; color: var(--electric-blue); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }

        .profile-card { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .p-left { display: flex; align-items: center; gap: 15px; }
        .photo-wrap { width: 60px; height: 60px; border-radius: 20px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; border: 2px solid var(--electric-blue); }
        .p-photo { width: 100%; height: 100%; border-radius: 18px; object-fit: cover; }
        .p-role { font-family: 'Space Grotesk'; font-size: 9px; font-weight: 900; background: var(--electric-blue); color: white; padding: 2px 8px; border-radius: 50px; display: inline-block; margin-bottom: 2px; }
        .p-name { font-family: 'Outfit'; font-size: 18px; font-weight: 800; color: var(--royal-blue); margin-bottom: 2px; }
        .p-plat { font-family: 'Inter'; font-size: 11px; font-weight: 600; color: var(--text-muted); }

        .dash-container { padding: 0 20px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* BANNER FC CLONE */
        .fc-banner { border-radius: 24px; padding: 20px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(135deg, var(--royal-blue) 0%, var(--electric-blue) 100%); color: white; box-shadow: 0 15px 40px rgba(10, 34, 89, 0.1);}
        .banner-title { font-family: 'Space Grotesk'; font-size: 16px; font-weight: 900; margin-bottom: 6px;}
        .banner-desc { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.8); }
        .banner-val { font-family: 'Space Grotesk'; font-size: 30px; font-weight: 900; text-shadow: 0 0 15px rgba(255, 255, 255, 0.4); text-align: right; }
        .banner-lbl { font-size: 8px; font-weight: 800; color: rgba(255,255,255,0.8); letter-spacing: 1px; margin-top: 4px; text-align: right; }

        /* MENU MEMBER CLONE */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .menu-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px 15px; display: flex; flex-direction: column; align-items: center; text-align: center; box-shadow: var(--shadow-soft); }
        .icon-box { width: 50px; height: 50px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 10px; color: white; }
        .ic-1 { background: linear-gradient(135deg, #60A5FA, #2563EB); }
        .ic-2 { background: linear-gradient(135deg, #fbbf24, #d97706); }
        .menu-title { font-family: 'Outfit'; font-size: 13px; font-weight: 800; color: var(--royal-blue); }

        /* ================================== */
        /* PANEL DEWA SILUMAN (HIDDEN BY DEFAULT) */
        /* ================================== */
        #godModePanel { display: none; margin-top: 25px; padding-top: 20px; border-top: 2px dashed var(--danger); animation: fadeInDown 0.3s; }
        @keyframes fadeInDown { from{opacity:0; transform:translateY(-10px);} to{opacity:1; transform:translateY(0);} }
        
        .god-header { display: flex; align-items: center; gap: 8px; font-family: 'Orbitron', 'Space Grotesk'; font-weight: 900; font-size: 16px; color: var(--danger); margin-bottom: 15px; }
        
        .god-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .btn-god { background: white; border: 1px solid var(--danger); border-radius: 16px; padding: 15px; text-align: center; color: var(--danger); font-family: 'Space Grotesk'; font-weight: 800; font-size: 11px; box-shadow: 0 5px 15px rgba(239,68,68,0.1); cursor: pointer; transition: 0.2s; }
        .btn-god i { font-size: 18px; margin-bottom: 8px; display: block; }
        .btn-god:active { transform: scale(0.95); }
        
        .btn-kiamat { grid-column: span 2; background: var(--danger); color: white; border: none; font-size: 13px; padding: 18px; }
    </style>
</head>
<body>

    <div id="authScreen">
        <i class="fas fa-fingerprint auth-icon"></i>
        <h2 class="auth-title">COMMAND CENTER</h2>
        <div style="color: #64748B; font-size: 12px;">Masukkan Passcode MCC</div>
        <input type="password" id="passInput" class="auth-input" maxlength="8" placeholder="••••••••">
        <button class="auth-btn" onclick="verifyDewa()">AKSES SISTEM</button>
    </div>

    <div class="dimensi-switch-container">
        <div class="dimensi-switch" onclick="toggleDimensi()">
            <div class="ds-slider"></div>
            <div class="ds-btn">MLU</div>
            <div class="ds-btn">K.C</div>
        </div>
    </div>

    <div class="dashboard-header">
        <div class="top-bar">
            <div>
                <div class="date-text" id="displayDate">HARI INI</div>
                <div class="greeting" id="greetingText" onclick="secretTap()">Halo!</div>
            </div>
        </div>

        <div class="profile-card glass-panel">
            <div class="p-left">
                <div class="photo-wrap"><img src="https://ui-avatars.com/api/?background=2D63ED&color=fff&bold=true&name=DW" class="p-photo"></div>
                <div>
                    <div class="p-role">COMMANDER</div>
                    <div class="p-name">Sang Pengendali</div>
                    <div class="p-plat" id="lblDatabase">Akses: Database RTOMAKA</div>
                </div>
            </div>
        </div>
    </div>

    <div class="dash-container">
        <div class="fc-banner glass-panel">
            <div>
                <div class="banner-title"><i class="fas fa-charging-station"></i> <span id="lblFcName">FC KELAPA GADING</span></div>
                <div class="banner-desc"><i class="fas fa-users"></i> Sedang Antre (Live Clone)</div>
            </div>
            <div>
                <div class="banner-val" id="valAntrean">12</div>
                <div class="banner-lbl">KENDARAAN</div>
            </div>
        </div>
    </div>

    <div class="dash-container">
        <div class="menu-grid">
            <div class="menu-btn"><div class="icon-box ic-1"><i class="fas fa-users"></i></div><div class="menu-title">Data Anggota</div></div>
            <div class="menu-btn"><div class="icon-box ic-2"><i class="fas fa-wallet"></i></div><div class="menu-title">Keuangan</div></div>
        </div>

        <div id="godModePanel">
            <div class="god-header"><i class="fas fa-eye"></i> PANEL DEWA AKTIF</div>
            <div class="god-grid">
                <div class="btn-god" onclick="alert('Bypass Antrean ' + currentMode)"><i class="fas fa-bolt"></i>Bypass Antrean</div>
                <div class="btn-god" onclick="alert('Edit Saldo ' + currentMode)"><i class="fas fa-coins"></i>Edit Saldo & Hak</div>
                <div class="btn-god"><i class="fas fa-map-marked-alt"></i>Kelola Lokasi FC</div>
                <div class="btn-god"><i class="fas fa-gavel"></i>Pengadilan (Banned)</div>
                <div class="btn-god btn-kiamat" onclick="globalReset()"><i class="fas fa-skull"></i> GLOBAL RESET ANTREAN</div>
            </div>
        </div>

    </div>

    <script>
        // === KONFIGURASI TEMA DAN DATABASE ===
        let currentMode = 'MLU'; // Default

        window.toggleDimensi = () => {
            const html = document.documentElement;
            const lblDB = document.getElementById('lblDatabase');
            const lblFc = document.getElementById('lblFcName');

            if (currentMode === 'MLU') {
                html.classList.add('theme-kc');
                currentMode = 'KC';
                lblDB.innerText = "Akses: Database KARTIKA CHANDRA";
                lblFc.innerText = "FC KARTIKA CHANDRA";
            } else {
                html.classList.remove('theme-kc');
                currentMode = 'MLU';
                lblDB.innerText = "Akses: Database RTOMAKA";
                lblFc.innerText = "FC KELAPA GADING";
            }
            // Nanti disini masukin kodingan pemanggil data Firebase sesuai Database
            console.log("Database aktif: " + currentMode);
        }

        // === SECURITY LOCK DEWA ===
        window.verifyDewa = () => {
            const pin = document.getElementById('passInput').value;
            if(pin === "250585") {
                sessionStorage.setItem('mcc_auth', 'UNLOCKED');
                document.getElementById('authScreen').style.opacity = '0';
                setTimeout(() => document.getElementById('authScreen').style.display = 'none', 500);
            } else {
                alert("⛔ AKSES DITOLAK! KODE SALAH.");
                document.getElementById('passInput').value = '';
            }
        }
        if(sessionStorage.getItem('mcc_auth') === 'UNLOCKED') document.getElementById('authScreen').style.display = 'none';

        // === STEALTH MODE (DOUBLE TAP) ===
        let clickCount = 0;
        window.secretTap = () => {
            clickCount++;
            if (clickCount >= 2) {
                // Munculin atau Sembunyiin Panel Dewa
                const panel = document.getElementById('godModePanel');
                if (panel.style.display === 'none' || panel.style.display === '') {
                    panel.style.display = 'block';
                } else {
                    panel.style.display = 'none';
                }
                clickCount = 0; // Reset
            }
            // Reset ketukan kalau kelamaan (lebih dari 1 detik)
            setTimeout(() => clickCount = 0, 1000);
        }

        // Tanggal dinamis
        document.getElementById('displayDate').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        
        window.globalReset = () => {
            if(confirm(`YAKIN HAPUS SEMUA ANTREAN DI ${currentMode}?`)) alert("Dihapus!");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MCC - Master Controller</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* TEMA MLU (DEFAULT) */
        :root { 
            --bg-main: #F0F4F8; --text-main: #0F172A; --text-muted: #64748B;
            --header-grad: linear-gradient(160deg, #0A2259 0%, #15398F 100%);
            --accent: #2D63ED; --accent-gold: #D4AF37;
            --card-bg: #FFFFFF; --danger: #EF4444; --success: #10B981;
        }

        /* TEMA KC */
        body.theme-kc {
            --bg-main: #022C22; --text-main: #ECFDF5; --text-muted: #A7F3D0;
            --header-grad: linear-gradient(160deg, #064E3B 0%, #047857 100%);
            --accent: #10B981; --accent-gold: #D4FF00;
            --card-bg: rgba(6, 78, 59, 0.6);
        }

        body { margin: 0; background: var(--bg-main); font-family: 'Inter', sans-serif; color: var(--text-main); padding-bottom: 80px; transition: 0.3s; overflow-x: hidden; -webkit-tap-highlight-color: transparent;}
        * { box-sizing: border-box; outline: none; transition: 0.3s; }

        /* SECURITY LOCK SCREEN */
        #authScreen { position: fixed; inset: 0; background: #050A15; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: opacity 0.5s; }
        .auth-input { padding: 15px; width: 100%; max-width: 300px; text-align: center; font-family: 'Space Grotesk'; font-size: 24px; letter-spacing: 8px; border-radius: 12px; border: 2px solid var(--danger); background: #000; color: #fff; margin: 25px 0 15px; outline:none;}
        .auth-btn { padding: 15px; background: var(--danger); color: #fff; border: none; border-radius: 12px; font-weight: 900; font-family: 'Space Grotesk'; cursor: pointer; width: 100%; max-width: 300px;}

        /* HEADER & SAKLAR */
        .header-dewa { background: var(--header-grad); padding: 30px 20px 20px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; position: relative;}
        
        .dimensi-switch { background: rgba(0,0,0,0.3); border-radius: 50px; padding: 4px; display: flex; position: relative; width: 220px; margin: 0 auto 15px; border: 1px solid rgba(255,255,255,0.2); }
        .ds-btn { flex: 1; text-align: center; padding: 8px 0; font-family: 'Space Grotesk'; font-weight: 900; font-size: 11px; color: white; cursor: pointer; z-index: 2; position: relative; }
        .ds-slider { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px); background: var(--accent-gold); border-radius: 50px; z-index: 1; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        body.theme-kc .ds-slider { left: calc(50%); }
        body.theme-kc .ds-slider::after { content: 'K.C'; position: absolute; inset:0; display:flex; align-items:center; justify-content:center; color: #064E3B; font-family:'Space Grotesk'; font-weight:900; font-size:11px; }
        body:not(.theme-kc) .ds-slider::after { content: 'MLU'; position: absolute; inset:0; display:flex; align-items:center; justify-content:center; color: #0A2259; font-family:'Space Grotesk'; font-weight:900; font-size:11px; }
        
        .title-tap { font-family: 'Orbitron'; font-size: 22px; color: white; margin: 0; letter-spacing: 1px; user-select: none; cursor: pointer;}
        
        .container { padding: 0 15px; }

        /* KHUSUS MLU: TOMBOL DAFTAR NGECAS */
        #mluDaftarArea { background: var(--card-bg); padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); }
        body.theme-kc #mluDaftarArea { display: none; } /* Hilang kalau di KC */
        .btn-daftar-ngecas { width: 100%; padding: 15px; background: var(--accent-gold); color: #000; border: none; border-radius: 12px; font-family: 'Space Grotesk'; font-size: 14px; font-weight: 900; cursor: pointer; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-daftar-ngecas:active { transform: scale(0.96); }

        /* BAGIAN SLOT SEDANG NGECAS */
        .sec-title { font-family: 'Space Grotesk'; font-size: 14px; font-weight: 900; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; color: var(--text-main);}
        .sec-title span { background: rgba(239, 68, 68, 0.1); color: var(--danger); padding: 2px 10px; border-radius: 50px; font-size: 11px; }

        .slot-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 25px; }
        .slot-card { background: var(--card-bg); border-radius: 16px; padding: 15px; border: 2px solid var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.05); position: relative;}
        .sc-plat { font-family: 'Orbitron'; font-size: 16px; font-weight: 900; color: var(--text-main); margin-bottom: 5px; text-align: center;}
        .sc-time { font-family: 'Space Grotesk'; font-size: 11px; font-weight: 800; color: var(--success); text-align: center; margin-bottom: 10px; background: rgba(16,185,129,0.1); padding: 4px; border-radius: 6px;}
        
        /* BAGIAN DAFTAR ANTREAN */
        .q-list { display: flex; flex-direction: column; gap: 10px; }
        .q-item { background: var(--card-bg); border-radius: 16px; padding: 15px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 5px 15px rgba(0,0,0,0.02);}
        .qi-left { display: flex; align-items: center; gap: 15px; }
        .qi-num { width: 35px; height: 35px; background: var(--bg-main); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk'; font-weight: 900; color: var(--accent); font-size: 16px;}
        .qi-plat { font-family: 'Orbitron'; font-size: 18px; font-weight: 900; color: var(--text-main);}

        /* ======================================= */
        /* MODERASI DEWA (BISA DISEMBUNYIKAN)      */
        /* ======================================= */
        .dewa-mod { display: flex; gap: 5px; margin-top: 10px; }
        .slot-card .dewa-mod { flex-direction: column; }
        .btn-mod { flex: 1; padding: 8px; border: none; border-radius: 8px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 10px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 4px;}
        .bm-kick { background: var(--danger); }
        .bm-ok { background: var(--success); }
        .bm-up { background: var(--accent); }

        /* Class untuk mode siluman (menyembunyikan tombol dewa) */
        .stealth-mode .dewa-mod { display: none !important; }

        /* MODAL DAFTAR MANUAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal-box { background: var(--bg-main); border: 2px solid var(--accent-gold); border-radius: 20px; width: 90%; max-width: 350px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center;}
        .modal-input { width: 100%; padding: 15px; background: var(--card-bg); border: 1px solid rgba(0,0,0,0.1); color: var(--text-main); border-radius: 12px; font-family: 'Space Grotesk'; font-size: 18px; font-weight: 700; text-align: center; outline: none; margin-bottom: 15px; text-transform: uppercase;}
    </style>
</head>
<body class="stealth-mode">

    <div id="authScreen">
        <i class="fas fa-fingerprint" style="font-size: 50px; color: var(--danger); margin-bottom: 20px;"></i>
        <h2 style="font-family: 'Orbitron'; color: white; margin: 0 0 10px;">COMMAND CENTER</h2>
        <input type="password" id="passInput" class="auth-input" maxlength="8" placeholder="••••••••">
        <button class="auth-btn" onclick="verifyDewa()">AKSES SISTEM</button>
    </div>

    <div class="header-dewa">
        <div class="dimensi-switch" onclick="toggleDimensi()">
            <div class="ds-slider"></div>
            <div class="ds-btn">MLU</div>
            <div class="ds-btn">K.C</div>
        </div>
        <h1 class="title-tap" onclick="secretTap()" id="mainTitle">MCC : MLU MASTER</h1>
        <div style="font-family: 'Space Grotesk'; font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 5px; letter-spacing: 2px;" id="subTitle">RTOMAKA DATABASE</div>
    </div>

    <div class="container">
        
        <div id="mluDaftarArea">
            <button class="btn-daftar-ngecas" onclick="bukaModalDaftar()">
                <i class="fas fa-plus-circle"></i> DAFTAR NGECAS MANUAL (BYPASS)
            </button>
        </div>

        <div class="sec-title">⚡ SEDANG NGECAS <span id="lblSlotCount">2 Slot Penuh</span></div>
        <div class="slot-grid" id="slotContainer">
            </div>

        <div class="sec-title">📋 DAFTAR ANTREAN <span id="lblAntreanCount">3 Plat</span></div>
        <div class="q-list" id="antreanContainer">
            </div>

    </div>

    <div class="modal-overlay" id="modalDaftar">
        <div class="modal-box">
            <h3 style="margin-top:0; font-family:'Space Grotesk'; color:var(--text-main); margin-bottom: 5px;">TAMBAH ANTREAN MLU</h3>
            <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 20px;">Masukkan plat nomor ke dalam sistem.</div>
            <input type="text" id="inpPlat" class="modal-input" placeholder="B 1234 XYZ">
            <button class="auth-btn" style="background: var(--accent); margin-bottom: 10px;" onclick="prosesDaftar()">MASUKKAN KE ANTREAN</button>
            <button class="auth-btn" style="background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted);" onclick="document.getElementById('modalDaftar').style.display='none'">BATAL</button>
        </div>
    </div>

    <script type="module">
        // Import Firebase disini nanti
        
        let currentMode = 'MLU'; // Default

        // 1. FUNGSI SAKLAR DIMENSI (MLU <-> KC)
        window.toggleDimensi = () => {
            const body = document.body;
            const title = document.getElementById('mainTitle');
            const sub = document.getElementById('subTitle');

            if (currentMode === 'MLU') {
                body.classList.add('theme-kc');
                currentMode = 'KC';
                title.innerText = "MCC : K.C MASTER";
                sub.innerText = "FCGADINGNEW22 DATABASE";
            } else {
                body.classList.remove('theme-kc');
                currentMode = 'MLU';
                title.innerText = "MCC : MLU MASTER";
                sub.innerText = "RTOMAKA DATABASE";
            }
            refreshData(); // Panggil fungsi ubah data di bawah
        }

        // 2. FUNGSI RAHASIA (STEALTH MODE)
        let tapCount = 0;
        window.secretTap = () => {
            tapCount++;
            if(tapCount >= 2) {
                document.body.classList.toggle('stealth-mode');
                const isStealth = document.body.classList.contains('stealth-mode');
                // Kasih feedback getar kalau di HP
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
                console.log(isStealth ? "Mode Siluman ON: Tombol Dewa Hilang" : "Mode Siluman OFF: Tombol Dewa Muncul");
                tapCount = 0;
            }
            setTimeout(() => tapCount = 0, 1000);
        }

        // 3. REFRESH DATA (Ubah tampilan berdasarkan Saklar)
        function refreshData() {
            const slotCont = document.getElementById('slotContainer');
            const qCont = document.getElementById('antreanContainer');

            if(currentMode === 'MLU') {
                document.getElementById('lblSlotCount').innerText = "2 Slot Penuh";
                slotCont.innerHTML = `
                    <div class="slot-card">
                        <div class="sc-plat">B 1234 MLU</div>
                        <div class="sc-time"><i class="fas fa-clock"></i> 14:30 Mnt</div>
                        <div class="dewa-mod">
                            <button class="btn-mod bm-ok" onclick="alert('Selesaikan MLU')"><i class="fas fa-check"></i> Selesai</button>
                            <button class="btn-mod bm-kick" onclick="alert('Kick MLU')"><i class="fas fa-skull"></i> Kick</button>
                        </div>
                    </div>
                    <div class="slot-card">
                        <div class="sc-plat">B 9999 XYZ</div>
                        <div class="sc-time"><i class="fas fa-clock"></i> 05:10 Mnt</div>
                        <div class="dewa-mod">
                            <button class="btn-mod bm-ok"><i class="fas fa-check"></i> Selesai</button>
                            <button class="btn-mod bm-kick"><i class="fas fa-skull"></i> Kick</button>
                        </div>
                    </div>
                `;

                document.getElementById('lblAntreanCount').innerText = "3 Plat";
                qCont.innerHTML = `
                    <div class="q-item">
                        <div class="qi-left">
                            <div class="qi-num">1</div><div class="qi-plat">B 4248 SWF</div>
                        </div>
                        <div class="dewa-mod" style="flex-direction:row;">
                            <button class="btn-mod bm-up"><i class="fas fa-arrow-up"></i></button>
                            <button class="btn-mod bm-kick"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                    <div class="q-item">
                        <div class="qi-left">
                            <div class="qi-num">2</div><div class="qi-plat">B 5555 BOS</div>
                        </div>
                        <div class="dewa-mod" style="flex-direction:row;">
                            <button class="btn-mod bm-up"><i class="fas fa-arrow-up"></i></button>
                            <button class="btn-mod bm-kick"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                `;
            } else {
                // DATA KETIKA SAKLAR DI KC
                document.getElementById('lblSlotCount').innerText = "1 Slot Terisi";
                slotCont.innerHTML = `
                    <div class="slot-card">
                        <div class="sc-plat">B 7777 KCA</div>
                        <div class="sc-time"><i class="fas fa-clock"></i> 20:00 Mnt</div>
                        <div class="dewa-mod">
                            <button class="btn-mod bm-ok" onclick="alert('Selesaikan KC')"><i class="fas fa-check"></i> Selesai</button>
                            <button class="btn-mod bm-kick"><i class="fas fa-skull"></i> Kick</button>
                        </div>
                    </div>
                `;

                document.getElementById('lblAntreanCount').innerText = "1 Plat";
                qCont.innerHTML = `
                    <div class="q-item">
                        <div class="qi-left">
                            <div class="qi-num">1</div><div class="qi-plat">B 1111 OJL</div>
                        </div>
                        <div class="dewa-mod" style="flex-direction:row;">
                            <button class="btn-mod bm-up"><i class="fas fa-arrow-up"></i></button>
                            <button class="btn-mod bm-kick"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                `;
            }
        }

        // 4. LOGIKA MODAL DAFTAR MANUAL (KHUSUS MLU)
        window.bukaModalDaftar = () => { document.getElementById('inpPlat').value = ''; document.getElementById('modalDaftar').style.display = 'flex'; }
        window.prosesDaftar = () => {
            const plat = document.getElementById('inpPlat').value.toUpperCase();
            if(!plat) return alert("Plat kosong!");
            alert(`Plat ${plat} masuk antrean MLU!`);
            document.getElementById('modalDaftar').style.display='none';
        }

        // 5. SECURITY LOCK DEWA
        window.verifyDewa = () => {
            const pin = document.getElementById('passInput').value;
            if(pin === "250585") {
                sessionStorage.setItem('mcc_auth', 'UNLOCKED');
                document.getElementById('authScreen').style.opacity = '0';
                setTimeout(() => document.getElementById('authScreen').style.display = 'none', 500);
            } else { alert("⛔ KODE SALAH."); }
        }
        document.getElementById('passInput').addEventListener('keypress', function (e) { if (e.key === 'Enter') verifyDewa(); });
        if(sessionStorage.getItem('mcc_auth') === 'UNLOCKED') document.getElementById('authScreen').style.display = 'none';

        // Load data pertama kali
        refreshData();
    </script>
</body>
</html>
